<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tienda - Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class = "bg-light">

        <!-- Agrega el script para obtener los categorias y mostrarlos en la tabla -->
    <div class="container mt-5">
        <h1 class="text-center mb-4">Lista de Categorías</h1>
        <div class="card shadow p-4">
        <table class="table table-bordered table-hover ">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
            </tr>
        </thead>
        <tbody id="tabla-categorias"></tbody>
    </table>
    </div>
    </div>

    <!-- Agrega el script para obtener los categorias y mostrarlos en la tabla -->
    <script>
        fetch('http://127.0.0.1:5000/categorias')
            .then(response => response.json())
            .then(data => {
                const tabla = document.getElementById('tabla-categorias');
                tabla.innerHTML = '';

                data.forEach(categoria => {
                    tabla.innerHTML += `
                        <tr>
                            <td>${categoria.id}</td>
                            <td>${categoria.nombre}</td>
                        </tr>
                    `;
                });
            })
            .catch(error => console.error('Error:', error));
    </script>

    <!-- Agrega el script para obtener los productos y mostrarlos en la tabla -->
    <div class="container mt-5">
        <h1 class="text-center mb-4">Lista de Productos</h1>
        <div class="card shadow p-4">
        <table class="table table-bordered table-hover ">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Categoría</th>
            </tr>
        </thead>
        <tbody id="tabla-productos"></tbody>
    </table>
    </div>
    </div>
    <!-- Agrega el script para obtener los productos y mostrarlos en la tabla -->
    <script>
        fetch('http://127.0.0.1:5000/productos')
            .then(response => response.json())
            .then(data => {
                const tabla = document.getElementById('tabla-productos');
                tabla.innerHTML = '';

                data.forEach(producto => {
                    tabla.innerHTML += `
                        <tr>
                            <td>${producto.id}</td>
                            <td>${producto.nombre}</td>
                            <td>${producto.precio}</td>
                            <td>${producto.stock}</td>
                            <td>${producto.categoria_id}</td>
                        </tr>
                    `;
                });
            })
            .catch(error => console.error('Error:', error));
    </script>
    <!-- Agrega el script para : endpoint GET /productos_categoria y mostrarlos en la tabla -->
    <div class="container mt-5">
        <h1 class="text-center mb-4">Productos por Categoría</h1>
        <div class="card shadow p-4">
        <table class="table table-bordered table-hover ">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Categoría</th>
            </tr>
        </thead>
        <tbody id="tabla-productos-categoria"></tbody>
    </table>
    </div>
    </div>

    <script>
        fetch('http://127.0.0.1:5000/productos_categoria')
            .then(response => response.json())
            .then(data => {
                const tabla = document.getElementById('tabla-productos-categoria');
                tabla.innerHTML = '';

                data.forEach(producto => {
                    tabla.innerHTML += `
                        <tr>
                            <td>${producto.id}</td>
                            <td>${producto.nombre}</td>
                            <td>${producto.precio}</td>
                            <td>${producto.stock}</td>
                            <td>${producto.categoria}</td>
                        </tr>
                    `;
                });
            })
            .catch(error => console.error('Error:', error));
    </script>



</body>
</html>
